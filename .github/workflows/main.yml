name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=dias-dev01&show_icons=true&theme=tokyonight
          path: images/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate top langs
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=dias-dev01&layout=compact&theme=tokyonight
          path: images/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.svg
          git commit -m "Update stats" || exit 0
          git push
